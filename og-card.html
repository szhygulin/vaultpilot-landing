<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<title>VaultPilot OG card source</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 85% 15%, rgba(16,185,129,0.20), transparent 55%),
      linear-gradient(135deg, #0a0f1a 0%, #14202b 100%);
    color: #e9edf2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* Subtle circuit-grid background pattern echoing the logo */
  .grid {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image:
      linear-gradient(to right, #10b981 1px, transparent 1px),
      linear-gradient(to bottom, #10b981 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .wrap {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 72px 80px;
    display: flex;
    align-items: center;
    gap: 64px;
  }
  .logo { width: 260px; height: 260px; flex-shrink: 0; filter: drop-shadow(0 18px 42px rgba(16,185,129,0.4)); }
  .copy { flex: 1; padding-right: 40px; }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #10b981;
    margin-bottom: 24px;
    padding: 8px 14px;
    border: 1px solid rgba(16,185,129,0.4);
    background: rgba(16,185,129,0.1);
    border-radius: 999px;
  }
  .tagline {
    font-size: 60px;
    font-weight: 800;
    line-height: 1.04;
    letter-spacing: -0.025em;
    margin-bottom: 28px;
    color: #f4f7fa;
  }
  .tagline .accent { color: #10b981; }
  .sub {
    font-size: 22px;
    color: #9aa4b2;
    line-height: 1.45;
    max-width: 720px;
    font-weight: 400;
  }
  .url {
    position: absolute;
    bottom: 40px;
    right: 80px;
    font-size: 18px;
    color: #9aa4b2;
    letter-spacing: 0.08em;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .url::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    margin-right: 12px;
    vertical-align: middle;
    box-shadow: 0 0 12px rgba(16,185,129,0.7);
  }
</style>
</head>
<body>
<div class="grid"></div>
<div class="wrap">
  <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="shieldG" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
      </linearGradient>
      <linearGradient id="checkG" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
      </linearGradient>
    </defs>
    <path d="M 100 20 L 170 45 L 170 100 Q 170 145, 100 180 Q 30 145, 30 100 L 30 45 Z" fill="url(#shieldG)" stroke="#10b981" stroke-width="3"/>
    <g stroke="#10b981" stroke-width="1" stroke-opacity="0.25" fill="none">
      <line x1="45" y1="60" x2="80" y2="60"/>
      <line x1="120" y1="60" x2="155" y2="60"/>
      <line x1="45" y1="140" x2="75" y2="140"/>
      <line x1="125" y1="140" x2="155" y2="140"/>
      <line x1="80" y1="60" x2="80" y2="75"/>
      <line x1="120" y1="60" x2="120" y2="75"/>
      <line x1="75" y1="140" x2="75" y2="125"/>
      <line x1="125" y1="140" x2="125" y2="125"/>
      <circle cx="45" cy="60" r="2.5" fill="#10b981" fill-opacity="0.4"/>
      <circle cx="155" cy="60" r="2.5" fill="#10b981" fill-opacity="0.4"/>
      <circle cx="45" cy="140" r="2.5" fill="#10b981" fill-opacity="0.4"/>
      <circle cx="155" cy="140" r="2.5" fill="#10b981" fill-opacity="0.4"/>
    </g>
    <path d="M 100 50 L 132 70 L 132 110 L 100 130 L 68 110 L 68 70 Z" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M 75 95 L 92 115 L 130 70" fill="none" stroke="url(#checkG)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 90 165 L 100 175 L 110 165" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
  </svg>
  <div class="copy">
    <div class="brand">VaultPilot</div>
    <div class="tagline">Hardware-<span class="accent">verified</span> DeFi<br>for AI agents.</div>
    <div class="sub">The agent proposes, you approve on your Ledger. Layered defenses so a compromised AI can't drain your wallet.</div>
  </div>
</div>
<div class="url">vaultpilot-mcp.ai</div>
</body>
</html>
