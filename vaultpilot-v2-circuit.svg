<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGradientA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGradientA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M 100 20
           L 170 45
           L 170 100
           Q 170 145, 100 180
           Q 30 145, 30 100
           L 30 45
           Z"
        fill="url(#shieldGradientA)"
        stroke="#10b981"
        stroke-width="3"/>

  <!-- Circuit pattern in background -->
  <g stroke="#10b981" stroke-width="1" stroke-opacity="0.25" fill="none">
    <!-- Horizontal lines -->
    <line x1="45" y1="60" x2="80" y2="60"/>
    <line x1="120" y1="60" x2="155" y2="60"/>
    <line x1="45" y1="140" x2="75" y2="140"/>
    <line x1="125" y1="140" x2="155" y2="140"/>

    <!-- Vertical connectors -->
    <line x1="80" y1="60" x2="80" y2="75"/>
    <line x1="120" y1="60" x2="120" y2="75"/>
    <line x1="75" y1="140" x2="75" y2="125"/>
    <line x1="125" y1="140" x2="125" y2="125"/>

    <!-- Circuit nodes -->
    <circle cx="45" cy="60" r="2.5" fill="#10b981" fill-opacity="0.4"/>
    <circle cx="155" cy="60" r="2.5" fill="#10b981" fill-opacity="0.4"/>
    <circle cx="45" cy="140" r="2.5" fill="#10b981" fill-opacity="0.4"/>
    <circle cx="155" cy="140" r="2.5" fill="#10b981" fill-opacity="0.4"/>
  </g>

  <!-- Hexagonal core (subtle nod to blockchain) -->
  <path d="M 100 50
           L 132 70
           L 132 110
           L 100 130
           L 68 110
           L 68 70
           Z"
        fill="none"
        stroke="#10b981"
        stroke-width="1.5"
        stroke-opacity="0.5"/>

  <!-- Checkmark -->
  <path d="M 75 95
           L 92 115
           L 130 70"
        fill="none"
        stroke="url(#checkGradientA)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- "V" notch at the bottom of the shield - signature element -->
  <path d="M 90 165
           L 100 175
           L 110 165"
        fill="none"
        stroke="#10b981"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-opacity="0.7"/>
</svg>
